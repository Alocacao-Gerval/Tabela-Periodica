<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tabela Periódica · Gerval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>

  <!-- ── HEADER ───────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-inner">

      <!-- Identidade -->
      <div class="identity">
        <img class="brand-logo" src="assets/gerval-logo.png" alt="Gerval"/>
        <div class="identity-divider" aria-hidden="true"></div>
        <div class="identity-text">
          <h1>Tabela<br>Periódica</h1>
          <div class="subtitle" id="subtitle">Carregando…</div>
        </div>
      </div>

      <!-- Controles -->
      <div class="controls">
        <div class="control-row">

          <div class="control-group">
            <div class="control-label">Geografia</div>
            <div class="segmented" role="group" aria-label="Geografia">
              <button id="geo-br" class="segmented-btn is-active" type="button">Brasil</button>
              <button id="geo-ex" class="segmented-btn" type="button">Exterior</button>
            </div>
          </div>

          <div class="control-sep" aria-hidden="true"></div>

          <div class="control-group">
            <div class="control-label">Display</div>
            <div class="segmented" role="group" aria-label="Display">
              <button id="mode-stacked"  class="segmented-btn is-active" type="button">Stacked</button>
              <button id="mode-zero"     class="segmented-btn"           type="button">Relative to zero</button>
              <button id="mode-asset"    class="segmented-btn"           type="button">Relative to asset</button>
            </div>
          </div>

          <div class="control-group ref-asset" id="refAssetGroup" style="display:none;">
            <div class="control-label">Ativo de referência</div>
            <select id="refAssetSelect"></select>
          </div>

          <div class="control-sep" aria-hidden="true"></div>

          <div class="control-group">
            <div class="control-label">Highlight</div>
            <div class="segmented" role="group" aria-label="Highlight">
              <button id="hl-class"  class="segmented-btn is-active" type="button">Classe</button>
              <button id="hl-return" class="segmented-btn"           type="button">Retorno</button>
            </div>
          </div>

        </div>

        <div class="legend-row" id="legendRow"></div>
      </div>

    </div>
  </header>

  <!-- ── CHART ────────────────────────────────────────────────────── -->
  <main class="main">
    <div class="chart-wrap">
      <div class="chart" id="chart"></div>
    </div>
  </main>

  <!-- ── FOOTER (overlay fixo) ────────────────────────────────────── -->
  <footer class="footnote">
    <div class="footnote-inner">
      <p class="footnote-disclaimer">Rentabilidade passada não é garantia de rentabilidade futura.</p>
      <div class="footnote-meta">
        <span class="footnote-period"><strong>Brasil:</strong> 2016–2026 &nbsp;·&nbsp; <strong>Exterior:</strong> 01/08/2017–2026</span>
        <span class="footnote-sep" aria-hidden="true">|</span>
        <span class="footnote-source">Fonte: Quantum, Bloomberg e ABS.</span>
      </div>
    </div>
  </footer>

  <div class="tooltip" id="tooltip" style="display:none;"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
